<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::#main-content})}">
<head>
    <title>Lançar Despesa - Piston & Wood</title>
</head>
<body>
    <div id="main-content" class="max-w-2xl mx-auto">
        <!-- Breadcrumb / Header -->
        <div class="mb-8">
            <a href="/custos" class="text-xs text-brand-neon hover:text-brand-orange flex items-center space-x-1 mb-2">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span>Voltar para Custos</span>
            </a>
            <h1 class="text-2xl font-bold font-numeric text-white tracking-wider">LANÇAR NOVA DESPESA MANUAL</h1>
            <p class="text-xs text-gray-400 mt-1">Registre custos fixos (ex: energia, aluguel, salários) ou despesas variáveis da oficina.</p>
        </div>

        <!-- FORM CARD -->
        <div class="bg-brand-panel border border-brand-border rounded-xl shadow-xl p-6 md:p-8">
            <form th:action="@{/custos}" th:object="${custo}" method="POST" class="space-y-6">
                <!-- Description -->
                <div>
                    <label for="descricao" class="block text-xs font-medium text-gray-400 mb-1.5">Descrição da Despesa</label>
                    <input type="text" id="descricao" th:field="*{descricao}" required
                           class="w-full bg-neutral-900 border border-brand-border focus:border-brand-neon text-white rounded-lg px-4 py-2.5 text-sm outline-none transition-colors"
                           placeholder="Ex: Conta de Energia Elétrica - Junho">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- Valor -->
                    <div>
                        <label for="valor" class="block text-xs font-medium text-gray-400 mb-1.5">Valor da Despesa (R$)</label>
                        <input type="number" step="0.01" id="valor" th:field="*{valor}" required min="0"
                               class="w-full bg-neutral-900 border border-brand-border focus:border-brand-neon text-white rounded-lg px-4 py-2.5 text-sm outline-none transition-colors font-mono"
                               placeholder="150.00">
                    </div>

                    <!-- Data -->
                    <div>
                        <label for="data" class="block text-xs font-medium text-gray-400 mb-1.5">Data do Vencimento/Pagamento</label>
                        <input type="date" id="data" th:field="*{data}" required
                               class="w-full bg-neutral-900 border border-brand-border focus:border-brand-neon text-white rounded-lg px-4 py-2.5 text-sm outline-none transition-colors font-mono">
                    </div>
                </div>

                <!-- Tipo -->
                <div>
                    <label for="tipo" class="block text-xs font-medium text-gray-400 mb-1.5">Tipo de Custo</label>
                    <select id="tipo" th:field="*{tipo}" required
                            class="w-full bg-neutral-900 border border-brand-border focus:border-brand-neon text-white rounded-lg px-4 py-2.5 text-sm outline-none transition-colors">
                        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t.descricao}"></option>
                    </select>
                </div>

                <!-- Submit buttons -->
                <div class="pt-6 border-t border-brand-border flex items-center justify-end space-x-4">
                    <a href="/custos" class="bg-neutral-800 hover:bg-neutral-700 text-white font-medium text-xs px-5 py-3 rounded-lg transition-colors font-numeric">
                        Cancelar
                    </a>
                    <button type="submit" class="bg-gradient-to-r from-brand-orange to-brand-neon hover:from-brand-darkOrange hover:to-brand-orange text-black font-bold text-xs px-6 py-3 rounded-lg shadow-lg font-numeric tracking-wide transition-all duration-300">
                        Lançar Despesa
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
