spring.application.name=prototype

# Server Port Config
server.port=8085

# Database Configuration (Persisting to a local file in ./db/ folder)
spring.datasource.url=jdbc:h2:file:./db/erp_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (Available at http://localhost:8085/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Config (Automatically update database schema based on entities)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf Caching (Disable during development for immediate UI updates)
spring.thymeleaf.cache=false
